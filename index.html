<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - UISOCIAL</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">
</head>
<body class="antialiased">
  <div class="flex items-center justify-center h-screen bg-gray-950">
    <div class="flex justify-between w-full max-w-[1150px] h-[750px] p-3 gap-2 rounded-[2.5rem] bg-white">
      <div class="w-1/2 overflow-hidden rounded-[2rem] bg-gray-900 relative">
        <img 
          src="https://images.unsplash.com/photo-1451187580459-43490279c0fa" 
          class="w-full h-full object-cover inset-0 absolute"
        >
        <div class="flex flex-col justify-between h-full p-10 relative">
          <div class="flex items-center justify-between text-white">
            <span class="font-bold text-lg tracking-wide">Selected Works</span>
            <div class="flex items-center gap-6">
              <span class="font-semibold text-sm cursor-pointer hover:text-gray-200 transition-colors">Sign Up</span>
              <button class="font-semibold text-sm rounded-full px-5 py-2 transition-colors border border-white/60 hover:text-black hover:bg-white">Join Us</button>
            </div>
          </div>
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-4">
              <img src="https://images.unsplash.com/photo-1599566150163-29194dcaad36" class="w-12 h-12 rounded-full border border-white/30 object-cover">
              <div>
                <h3 class="font-bold text-lg text-white leading-tight">Andrew.ui</h3>
                <p class="font-medium text-sm text-gray-300">UI & Illustration</p>
              </div>
            </div>
            <div class="flex gap-2">
              <button class="flex items-center justify-center w-10 h-10 text-white rounded-full transition-colors border border-white/30 hover:bg-white/20 backdrop-blur-md">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
              </button>
              <button class="flex items-center justify-center w-10 h-10 text-white rounded-full transition-colors border border-white/30 hover:bg-white/20 backdrop-blur-md">
                <i data-lucide="arrow-right" class="w-4 h-4"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="flex flex-col w-1/2 p-8">
        <div class="flex items-center justify-between">
          <div class="font-black text-xl text-gray-900 tracking-tighter uppercase">Welcome</div>
          <button class="flex items-center font-bold text-[11px] text-gray-700 px-4 py-2 gap-2 transition-colors shadow-sm rounded-full border border-gray-200 bg-white hover:bg-gray-50">
            🇬🇧 EN <i data-lucide="chevron-down" class="w-3 h-3 text-gray-400"></i>
          </button>
        </div>
        <div class="flex-1 flex flex-col items-center justify-center w-full max-w-[360px] mx-auto">
          <div class="font-black text-4xl text-gray-900 tracking-tighter mb-5">Get Started</div>
          <p class="font-semibold text-sm text-gray-500 mb-12">Let's start your journey</p>
          <input 
            type="email" 
            placeholder="Email" 
            class="w-full font-semibold text-sm text-gray-800 px-5 py-3.5 mb-4 rounded-xl border border-gray-300 bg-white placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-orange-600 focus:border-orange-600 transition-colors shadow-sm"
          >
          <input 
            type="password" 
            placeholder="Password" 
            class="w-full font-semibold text-sm text-gray-800 px-5 py-3.5 mb-4 rounded-xl border border-gray-300 bg-white placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-orange-600 focus:border-orange-600 transition-colors shadow-sm"
          >
          <a href="#" class="font-bold text-sm text-orange-600 self-end mb-8 hover:underline">Forgot password?</a>
          <div class="flex items-center w-full gap-4 mb-8">
            <div class="flex-1 h-px bg-gray-200"></div>
            <span class="font-medium text-sm text-gray-400 px-1">or</span>
            <div class="flex-1 h-px bg-gray-200"></div>
          </div>
          <button class="flex items-center justify-center w-full font-bold text-sm text-gray-700 px-5 py-3.5 mb-4 rounded-xl gap-3 border border-gray-300 bg-white hover:bg-gray-50 transition-colors shadow-sm relative">
            <svg class="w-[18px] h-[18px]" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Login with Google
          </button>
          <button class="flex items-center justify-center w-full font-bold text-sm text-white px-5 py-3.5 mb-4 rounded-xl gap-3 border border-orange-600 bg-orange-600 transition-colors shadow-[0_8px_20px_rgba(228,75,65,0.25)] hover:shadow-[0_4px_10px_rgba(228,75,65,0.35)] relative">
            Login
          </button>
          <p class="font-semibold text-gray-500 text-sm mt-6">
            Don't have an account? <a href="#" class="font-bold text-orange-600">Sign up</a>
          </p>
        </div>
        <div class="flex justify-center text-gray-600 gap-7 mt-auto pb-2">
          <a href="#" class="hover:text-gray-900 transition-colors">
            <i data-lucide="facebook" class="w-[18px] h-[18px] fill-current"></i>
          </a>
          <a href="#" class="hover:text-gray-900 transition-colors">
            <i data-lucide="twitter" class="w-[18px] h-[18px] fill-current"></i>
          </a>
          <a href="#" class="hover:text-gray-900 transition-colors">
            <i data-lucide="linkedin" class="w-[18px] h-[18px] fill-current"></i>
          </a>
        </div>
      </div>
    </div>
    <a href="https://sergiocode.dev/" target="_blank" class="flex items-center font-bold text-[10px] text-neutral-700 gap-2 tracking-widest uppercase transition-all hover:text-neutral-50 duration-300 bottom-10 absolute group">
      <img src="logo.svg" class="w-5 h-5 opacity-40 transition-opacity group-hover:opacity-100">
      <span>© 2026 Developed by Sergio</span>
    </a>
  </div>
</body>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
  lucide.createIcons();
</script>
</html>
